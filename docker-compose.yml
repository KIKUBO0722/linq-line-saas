services:
  postgres:
    image: postgres:16-alpine
    container_name: line-saas-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: line_saas
      POSTGRES_PASSWORD: line_saas_dev
      POSTGRES_DB: line_saas
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: line-saas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
